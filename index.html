<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meepletown Pages | 이벤트 페이지 모음</title>
  <meta
    name="description"
    content="Meepletown Pages의 이벤트 페이지 모음입니다. 샘플 이벤트와 향후 추가될 이벤트 페이지를 한 곳에서 확인할 수 있습니다."
  >
  <meta property="og:type" content="website">
  <meta property="og:title" content="Meepletown Pages | 이벤트 페이지 모음">
  <meta
    property="og:description"
    content="Meepletown Pages의 이벤트 페이지 모음입니다. 샘플 이벤트와 향후 추가될 이벤트 페이지를 한 곳에서 확인할 수 있습니다."
  >
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #5b5fef;
      --primary-dark: #4347d4;
      --border: #e5e7eb;
      --shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, rgba(91, 95, 239, 0.16), transparent 28%),
        linear-gradient(180deg, #eef2ff 0%, var(--bg) 34%, #f8fafc 100%);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .hero {
      padding: 28px 22px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(91, 95, 239, 0.12);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      margin-top: 14px;
      font-size: 32px;
      line-height: 1.25;
    }

    .hero-copy {
      margin-top: 14px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .section-title {
      margin-top: 28px;
      margin-bottom: 14px;
      font-size: 22px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .card p {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.7;
    }

    .card-actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 16px;
      font-weight: 800;
    }

    .button-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .button-primary:hover,
    .button-primary:focus-visible {
      background: var(--primary-dark);
    }

    .button-secondary {
      border: 1px solid var(--border);
      background: #f9fafb;
    }

    @media (min-width: 768px) {
      .page {
        padding: 40px 24px 72px;
      }

      .hero {
        padding: 40px 36px;
      }

      h1 {
        font-size: 42px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="hero">
        <span class="badge">GitHub Pages Event Hub</span>
        <h1>Meepletown 이벤트 페이지 모음</h1>
        <p class="hero-copy">
          기획자와 개발자가 함께 관리하는 정적 이벤트 페이지 모음입니다.
          아래 샘플 이벤트를 열어 실제 GitHub Pages 배포 구조와 화면 구성을 바로 확인할 수 있습니다.
        </p>
      </section>

      <h2 class="section-title">테스트 페이지</h2>
      <div class="grid">
        <article class="card">
          <h2>미플온 보드게임 이벤트</h2>
          <p>
            모바일 퍼스트, 카드형 레이아웃, 큰 CTA 버튼, SEO 메타 태그가 포함된 샘플 이벤트 페이지입니다.
          </p>
          <div class="card-actions">
            <a class="button button-primary" href="./events/sample-event/">샘플 이벤트 열기</a>
            <a class="button button-secondary" href="./docs/HOW_TO_CREATE_EVENT.md">작업 가이드 보기</a>
          </div>
        </article>
      </div>
    </div>
  </main>
</body>
</html>
