<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[이벤트 제목을 입력하세요]</title>
  <meta name="description" content="[이벤트 설명을 입력하세요]">
  <meta property="og:type" content="website">
  <meta property="og:title" content="[이벤트 제목을 입력하세요]">
  <meta property="og:description" content="[이벤트 설명을 입력하세요]">
  <meta property="og:image" content="./banner.webp">
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #5b5fef;
      --border: #e5e7eb;
      --shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius-md);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      padding: 20px 16px 48px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .hero,
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      margin-bottom: 16px;
    }

    .hero-content,
    .card {
      padding: 20px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(91, 95, 239, 0.12);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      margin-top: 14px;
      font-size: 30px;
      line-height: 1.25;
    }

    p {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.7;
    }

    .section-list {
      display: grid;
      gap: 16px;
    }

    .image-frame {
      margin-top: 16px;
    }

    .cta-wrap {
      margin-top: 24px;
    }

    .cta-button {
      display: inline-flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 18px 20px;
      border-radius: 18px;
      background: var(--primary);
      color: #ffffff;
      font-size: 18px;
      font-weight: 800;
    }

    @media (min-width: 768px) {
      .page {
        padding: 32px 24px 64px;
      }

      .hero-content,
      .card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="hero">
        <img src="./banner.webp" alt="[배너 이미지 설명]">
        <div class="hero-content">
          <span class="eyebrow">[카테고리 또는 짧은 라벨]</span>
          <h1>[이벤트 제목을 입력하세요]</h1>
          <p>[이벤트 소개 문장을 입력하세요. 날짜, 장소, 혜택 등을 간단히 정리하면 좋습니다.]</p>
        </div>
      </section>

      <div class="section-list">
        <section class="card">
          <h2>[섹션 제목 1]</h2>
          <p>[첫 번째 섹션 설명을 입력하세요.]</p>
          <div class="image-frame">
            <img src="./detail-01.webp" alt="[상세 이미지 1 설명]">
          </div>
        </section>

        <section class="card">
          <h2>[섹션 제목 2]</h2>
          <p>[두 번째 섹션 설명을 입력하세요.]</p>
          <div class="image-frame">
            <img src="./detail-02.webp" alt="[상세 이미지 2 설명]">
          </div>
        </section>

        <section class="card">
          <h2>[섹션 제목 3]</h2>
          <p>[추가 안내 문구를 입력하세요. 이미지가 필요 없으면 이 카드만 텍스트로 사용해도 됩니다.]</p>
        </section>
      </div>

      <div class="cta-wrap">
        <a class="cta-button" href="[버튼 링크를 입력하세요]">[버튼 문구를 입력하세요]</a>
      </div>
    </div>
  </main>
</body>
</html>
